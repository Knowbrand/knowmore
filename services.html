<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services | KnowMore</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:white;
}

.services{
padding:80px 8%;
}

.services-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:40px;
}

.service-card{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.service-card:hover{
transform:translateY(-8px);
}

.service-icon{
font-size:28px;
margin-bottom:15px;
}

</style>

</head>

<body>

<nav>

<div>KnowMore</div>

<div>
<a href="index.html">Home</a>
</div>

</nav>

<section class="services">

<h1>Our Services</h1>

<div class="services-grid">

<div class="service-card">
<i class="fas fa-globe service-icon"></i>
<h3>Business Websites</h3>
<p>Modern websites for small businesses.</p>
</div>

<div class="service-card">
<i class="fas fa-mobile-alt service-icon"></i>
<h3>Mobile Responsive</h3>
<p>Optimized for every phone and tablet.</p>
</div>

<div class="service-card">
<i class="fas fa-map-marker-alt service-icon"></i>
<h3>Google Maps</h3>
<p>Customers can easily find your location.</p>
</div>

<div class="service-card">
<i class="fas fa-comments service-icon"></i>
<h3>WhatsApp Integration</h3>
<p>Customers contact you instantly.</p>
</div>

</div>

</section>

</body>
</html>
