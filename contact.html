<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | KnowMore</title>

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#f3f3f3,#e8e8e8,#fafafa);
color:#111;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 8%;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:black;
font-weight:500;
}

.demo-btn{
background:black;
color:white;
padding:10px 22px;
border-radius:25px;
text-decoration:none;
}

/* PAGE */

.container{
margin-top:140px;
padding:60px 10%;
text-align:center;
}

/* CONTACT CARD */

.contact-card{
max-width:600px;
margin:auto;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
padding:40px;
border-radius:16px;
}

.contact-card h2{
margin-bottom:25px;
}

/* FORM */

input, textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

button{
background:black;
color:white;
padding:12px 30px;
border:none;
border-radius:25px;
cursor:pointer;
font-size:14px;
}

/* FOOTER */

footer{
background:#111;
color:white;
padding:60px 10%;
margin-top:80px;
}

.footer-grid{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:40px;
}

footer h4{
margin-bottom:12px;
}

footer p{
opacity:0.7;
margin:5px 0;
}

.copyright{
text-align:center;
margin-top:40px;
opacity:0.6;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.container{
padding:40px 8%;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">KnowMore</div>

<div class="nav-links">
<a href="index.html#services">Services</a>
<a href="index.html#portfolio">Work</a>
<a href="pricing.html">Pricing</a>
<a href="faq.html">FAQ</a>
<a href="contact.html">Contact</a>
</div>

<a href="demo.html" class="demo-btn">Book Free Demo</a>

</nav>

<div class="container">

<div class="contact-card">

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

<footer>

<div class="footer-grid">

<div>
<h4>KnowMore</h4>
<p>Modern websites for local businesses.</p>
</div>

<div>
<h4>Founders</h4>
<p>Sidharth Gaikwad</p>
<p>Mohammed Kaif</p>
<p>Rishi Suryawanshi</p>
</div>

<div>
<h4>Contact</h4>
<p>Phone: +91 9167878131</p>
<p>WhatsApp Available</p>
</div>

</div>

<div class="copyright">
© 2026 KnowMore
</div>

</footer>

</body>
</html>
