<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success | Knovalab</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    :root{
      --accent:#ff6a00;
      --accent-2:#ff8a33;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.72);
      --line:rgba(255,255,255,0.08);
      --shadow:0 24px 70px rgba(0,0,0,0.3);
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top, rgba(255,106,0,0.12), transparent 24%),
        linear-gradient(180deg, #111 0%, #080808 100%);
      color:var(--text);
      padding:20px;
    }

    .card{
      width:min(100%, 620px);
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border:1px solid var(--line);
      border-radius:28px;
      padding:34px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .icon{
      width:74px;
      height:74px;
      margin:0 auto 18px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      font-size:34px;
      font-weight:800;
    }

    h1{
      font-size:clamp(32px, 5vw, 52px);
      line-height:1;
      letter-spacing:-1.3px;
      margin-bottom:12px;
    }

    p{
      color:var(--muted);
      line-height:1.8;
      margin-bottom:24px;
    }

    .details{
      text-align:left;
      display:grid;
      gap:12px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:18px;
      padding:18px;
      margin-bottom:24px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      padding-bottom:10px;
      flex-wrap:wrap;
    }

    .row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      color:rgba(255,255,255,0.58);
    }

    .value{
      font-weight:700;
      word-break:break-word;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:160px;
      padding:13px 20px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      transition:0.3s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:white;
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.1);
      color:white;
      background:rgba(255,255,255,0.02);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    @media(max-width:640px){
      .card{
        padding:24px 18px;
        border-radius:22px;
      }

      .row{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Payment Successful</h1>
    <p>
      This is a Razorpay test payment success page for Knovalab. Your payment flow worked correctly.
    </p>

    <div class="details">
      <div class="row">
        <span class="label">Selected Plan</span>
        <span class="value" id="plan">-</span>
      </div>
      <div class="row">
        <span class="label">Amount</span>
        <span class="value" id="amount">-</span>
      </div>
      <div class="row">
        <span class="label">Payment ID</span>
        <span class="value" id="paymentId">-</span>
      </div>
    </div>

    <div class="actions">
      <a href="../index.html" class="btn btn-primary">Back to Pricing</a>
      <a href="../../demo/" class="btn btn-secondary">Book Free Demo</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan") || "N/A";
    const amount = params.get("amount") || "N/A";
    const paymentId = params.get("payment_id") || "N/A";

    document.getElementById("plan").textContent = plan;
    document.getElementById("amount").textContent = amount === "N/A" ? amount : "₹" + amount;
    document.getElementById("paymentId").textContent = paymentId;
  </script>
</body>
</html>
